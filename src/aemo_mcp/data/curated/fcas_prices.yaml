    description: Lower 5-minute FCAS volume-weighted average price ($/MW/h)
    unit: $/MW/h
  - key: lower5min_volume
    source_column: LOWER5MINVOLUME
    description: Lower 5-minute FCAS cleared volume (MW)
    unit: MW
