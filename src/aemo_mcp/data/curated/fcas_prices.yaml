id: fcas_prices
name: NEM Volume-Weighted Average FCAS Prices — Daily
description: |
  Daily volume-weighted average (VWA) prices for all eight Frequency Control
  Ancillary Services (FCAS) markets in the NEM, covering both raise and lower
  services across four response times: 6-second, 60-second, 5-minute, and
  regulation. Source: Vwa_Fcas_Prices / TRADING.VWAFCASPRICES.

  Published once daily (for the prior trading day) by AEMO. Each row covers
  one 30-minute trading interval with the VWA price, volume, and revenue for
  each of the eight FCAS services across the NEM.

  Use this for: FCAS revenue analysis, generator ancillary services income,
  system strength market trends, and renewable integration cost assessment.
cadence: Daily
cache_kind: daily
settlement_column: SETTLEMENTDATE
source_url: https://www.nemweb.com.au/Reports/Current/Vwa_Fcas_Prices/

folders:
  - path: /Reports/Current/Vwa_Fcas_Prices/
    filename_regex: "PUBLIC_VWAFCASPRICES_\\d{12}_\\d{14}\\.zip"
    sections:
      - name: TRADING.VWAFCASPRICES

filters: []

